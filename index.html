<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Шапка для сайта областной больницы</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link rel="stylesheet" href=style.css>
</head>
<body>
    <header class="hospital-header">
        <!-- Верхняя строка: контакты, экстренная помощь -->
        <div class="top-bar">
            <div class="container">
                <div class="contacts-header">
                    <span><i class="who"></i>Журавлев Матвей 9-ИС403</span>
                    <span><i class="fas fa-phone-alt"></i> +7 (383) 123-45-67</span>
                    <span><i class="fas fa-envelope"></i> info@oblmed.nsk.ru</span>
                    <span><i class="fas fa-map-marker-alt"></i> г. Новосибирск, ул. Больничная, 2</span>

                </div>
                <div class="emergency">
                    <i class="fas fa-ambulance"></i> 103 / 112 — Экстренная помощь
                </div>
            </div>
        </div>

        <!-- Основная шапка: логотип, навигация, кнопка -->
        <div class="main-header">
            <div class="container header-flex">
                <div class="logo-area">
                    <div class="logo-icon">
                        <i class="fas fa-hospital-user" style="color:#1f7b4d;"></i>
                    </div>
                    <div class="logo-text">
                        <h1>НОВОСИБИРСКАЯ ОБЛАСТНАЯ БОЛЬНИЦА</h1>
                        <p>ГБУЗ НСО «НОКБ» | Круглосуточная помощь</p>
                    </div>
                </div>
                <nav class="nav-menu">
                    <ul>
                        <li><a href="#">Главная</a></li>
                        <li><a href="#">Отделения</a></li>
                        <li><a href="#">Врачи</a></li>
                        <li><a href="#">Пациентам</a></li>
                        <li><a href="#">Контакты</a></li>
                    </ul>
                </nav>
                <button class="appointment-btn" onclick="alert('Форма записи на приём')"><i class="fas fa-calendar-check"></i> Записаться</button>
            </div>
        </div>
    </header>

    <main>
        <div class="container" style="padding: 40px 24px;">
                <button class="swipe"><a href="service.html">Григорий Ковалев</a></button>
        </div>
    </main>
</body>
</html>
